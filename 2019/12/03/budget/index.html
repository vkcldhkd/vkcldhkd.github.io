  <div class="article-content">
    
      <p><a target="_blank" rel="noopener" href="https://programmers.co.kr/learn/courses/30/lessons/12982">문제 설명</a></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">S사에서는 각 부서에 필요한 물품을 지원해 주기 위해 부서별로 물품을 구매하는데 필요한 금액을 조사했습니다. 그러나, 전체 예산이 정해져 있기 때문에 모든 부서의 물품을 구매해 줄 수는 없습니다. 그래서 최대한 많은 부서의 물품을 구매해 줄 수 있도록 하려고 합니다.</span><br><span class="line"></span><br><span class="line">물품을 구매해 줄 때는 각 부서가 신청한 금액만큼을 모두 지원해 줘야 합니다. 예를 들어 1,000원을 신청한 부서에는 정확히 1,000원을 지원해야 하며, 1,000원보다 적은 금액을 지원해 줄 수는 없습니다.</span><br><span class="line"></span><br><span class="line">부서별로 신청한 금액이 들어있는 배열 d와 예산 budget이 매개변수로 주어질 때, 최대 몇 개의 부서에 물품을 지원할 수 있는지 return 하도록 solution 함수를 완성해주세요.</span><br><span class="line"></span><br><span class="line">제한사항</span><br><span class="line">d는 부서별로 신청한 금액이 들어있는 배열이며, 길이(전체 부서의 개수)는 1 이상 100 이하입니다.</span><br><span class="line">d의 각 원소는 부서별로 신청한 금액을 나타내며, 부서별 신청 금액은 1 이상 100,000 이하의 자연수입니다.</span><br><span class="line">budget은 예산을 나타내며, 1 이상 10,000,000 이하의 자연수입니다.</span><br></pre></td></tr></table></figure>

<p>Swift 코드</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><span class="line">func solution(_ d:[Int], _ budget:Int) -&gt; Int &#123;</span><br><span class="line">    let sortedArray = d.sorted()</span><br><span class="line">    var result = 0</span><br><span class="line">    var resultBudget = budget</span><br><span class="line">    for i in 0 ..&lt; sortedArray.count&#123;</span><br><span class="line">        let index = sortedArray[i]</span><br><span class="line">        guard index &lt;= resultBudget else &#123; break &#125;</span><br><span class="line">        resultBudget -= index</span><br><span class="line">        result += 1</span><br><span class="line">    &#125;</span><br><span class="line">    print(&quot;sortedArray : \(sortedArray)&quot;)</span><br><span class="line">    return result</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">print(solution([1,3,2,5,4], 9))</span><br><span class="line"></span><br></pre></td></tr></table></figure>
