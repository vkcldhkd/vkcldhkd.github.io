  <div class="article-content">
    
      <p>입력할 수 있는 Alert창이 필요해서 뚝딱 하나 만들었다.</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br></pre></td><td class="code"><pre><span class="line">func createTextFieldAlert(title: String?, previousText: String? = nil, completion: @escaping (String) -&gt; Void) -&gt; UIAlertController&#123;</span><br><span class="line">    let alert = UIAlertController(</span><br><span class="line">        title: title,</span><br><span class="line">        message: nil,</span><br><span class="line">        preferredStyle: .alert)</span><br><span class="line">    </span><br><span class="line">    let okAction = UIAlertAction(</span><br><span class="line">    title: &quot;OK&quot;,</span><br><span class="line">    style: .default</span><br><span class="line">    ) &#123; [unowned alert] _ in</span><br><span class="line">        let text = alert.textFields![0].text</span><br><span class="line">        // do something interesting with &quot;answer&quot; here</span><br><span class="line">        LogHelper.printLog(&quot;text : \(text)&quot;)</span><br><span class="line">        completion(text ?? &quot;&quot;)</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    alert.addTextField &#123; textField in</span><br><span class="line">        textField.text = previousText</span><br><span class="line">        NotificationCenter.default.addObserver(forName: UITextField.textDidChangeNotification, object: textField, queue: OperationQueue.main) &#123; (notification) in</span><br><span class="line">            LogHelper.printLog(&quot;containsEmoji : \((textField.text ?? &quot;&quot;).containsEmoji)&quot;)</span><br><span class="line">            guard let inputText = textField.text else &#123;</span><br><span class="line">                okAction.isEnabled = false</span><br><span class="line">                return</span><br><span class="line">            &#125;</span><br><span class="line">            </span><br><span class="line">            okAction.isEnabled = !inputText.containsEmoji &amp;&amp; inputText.count &gt; 1 &amp;&amp; previousText != inputText</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    </span><br><span class="line">    okAction.isEnabled = false</span><br><span class="line">    </span><br><span class="line">    alert.addAction(okAction)</span><br><span class="line">    alert.addAction(UIAlertAction.cancelAction())</span><br><span class="line">    return alert</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>


<p>사용법은 아래와같다 :)</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">UIAlertController.createTextFieldAlert(</span><br><span class="line">    title: &quot;변경할 닉네임을 입력해 주세요.&quot;,</span><br><span class="line">    previousText: &quot;UserInformationManager.shared.userInfo?.displayName&quot;</span><br><span class="line">) &#123; [weak self] name in</span><br><span class="line">    LogHelper.printLog(&quot;name : \(name)&quot;)</span><br><span class="line">&#125;.show()</span><br></pre></td></tr></table></figure>
