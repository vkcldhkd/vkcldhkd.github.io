><br><span class="line">            upload_stg()</span><br><span class="line">            upload_prd()</span><br><span class="line">            upload_prd_test_ad()</span><br><span class="line">            uploadedAllBuild()</span><br><span class="line">        rescue =&gt; exception</span><br><span class="line">            on_error(exception)</span><br><span class="line">        end</span><br><span class="line">    end</span><br><span class="line"></span><br><span class="line">end</span><br></pre></td></tr></table></figure>

/span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br></pre></td><td class="code"><pre><span class="line">def test_lane</span><br><span class="line">    clear_derived_data</span><br><span class="line">    scan(</span><br><span class="line">        workspace: &quot;projectName.xcworkspace&quot;,</span><br><span class="line">        devices: [&quot;iPhone 6s&quot;, &quot;iPad Air&quot;]</span><br><span class="line">    )</span><br><span class="line">end</span><br><span class="line"></span><br><span class="line">def uploadedAllBuild</span><br><span class="line">    slack(</span><br><span class="line">        message: &quot;Successfully uploaded a All build&quot;,</span><br><span class="line">        slack_url: &quot;url&quot;</span><br><span class="line">    )</span><br><span class="line">    slack(</span><br><span class="line">        message: &quot;Successfully uploaded a All build&quot;,</span><br><span class="line">        slack_url: &quot;url&quot;</span><br><span class="line">    )</span><br><span class="line">end</span><br><span class="line"></span><br><span class="line">def sendSlack</span><br><span class="line">    slack(</span><br><span class="line">        message: &quot;Successfully uploaded a new App Store build&quot;,</span><br><span class="line">        slack_url: &quot;url&quot;</span><br><span class="line">    )</span><br><span class="line">    slack(</span><br><span class="line">        message: &quot;Successfully uploaded a new App Store build&quot;,</span><br><span class="line">        slack_url: &quot;url&quot;</span><br><span class="line">    )</span><br><span class="line">end</span><br><span class="line"></span><br><span class="line">def slackTest</span><br><span class="line">   slack(</span><br><span class="line">       message: &quot;Test&quot;,</span><br><span class="line">       success: true,</span><br><span class="line">       slack_url: &quot;url&quot;,</span><br><span class="line">       attachment_properties: &#123;</span><br><span class="line">           fields: [</span><br><span class="line">               &#123;</span><br><span class="line">                   title: &quot;슬랙 보내기 테스트 입니다.&quot;,</span><br><span class="line">                   value: ENV[&quot;BUILD_NUMBER&quot;],</span><br><span class="line">               &#125;</span><br><span class="line">           ]</span><br><span class="line">       &#125;</span><br><span class="line">   )</span><br><span class="line">end</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">def on_error(exception)</span><br><span class="line">   slack(</span><br><span class="line">       message: &quot;Error!!!&quot;,</span><br><span class="line">       success: false,</span><br><span class="line">       slack_url: &quot;url&quot;,</span><br><span class="line">       attachment_properties: &#123;</span><br><span class="line">           fields: [</span><br><span class="line">               &#123;</span><br><span class="line">                   title: &quot;Build number&quot;,</span><br><span class="line">                   value: ENV[&quot;BUILD_NUMBER&quot;],</span><br><span class="line">               &#125;,</span><br><span class="line">               &#123;</span><br><span class="line">                   title: &quot;Error message&quot;,</span><br><span class="line">                   value: exception.to_s,</span><br><span class="line">                   short: false</span><br><span class="line">               &#125;</span><br><span class="line">           ]</span><br><span class="line">       &#125;</span><br><span class="line">   )</span><br><span class="line">end</span><br></pre></td></tr></table></figure>
